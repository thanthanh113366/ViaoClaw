  CustomTTS:
    # Dịch vụ giao diện TTS tùy chỉnh, các tham số yêu cầu có thể được tùy chỉnh và có thể kết nối với nhiều dịch vụ TTS
    # Lấy KokoroTTS được triển khai cục bộ làm ví dụ
    # Nếu chỉ có cpu đang chạy: docker run -p 8880:8880 ghcr.io/remsky/kokoro-fastapi-cpu:latest
    # Nếu chỉ có gpu đang chạy: docker run --gpus all -p 8880:8880 ghcr.io/remsky/kokoro-fastapi-gpu:latest
    # Yêu cầu giao diện sử dụng phương thức POST để yêu cầu và trả về file âm thanh
    type: custom
    method: POST
    url: "http://127.0.0.1:8880/v1/audio/speech"
    params: # Tham số yêu cầu tùy chỉnh
      input: "{prompt_text}"
      response_format: "mp3"
      download_format: "mp3"
      voice: "zf_xiaoxiao"
      lang_code: "z"
      return_download_link: true
      speed: 1
      stream: false
    headers: # Tiêu đề yêu cầu tùy chỉnh
      # Authorization: Bearer xxxx
    format: mp3 # Định dạng âm thanh được giao diện trả về
    output_dir: tmp/
    # ngôn ngữ: "Tiếng Trung" # Chỉ định ngôn ngữ đầu ra, chẳng hạn như: Tiếng Trung, Tiếng Anh, Tiếng Nhật, Tiếng Hàn, v.v. Vui lòng đặt theo ngôn ngữ được hỗ trợ bởi âm đã chọn. Nếu để trống thì mặc định là tiếng Trung.
  PaddleSpeechTTS:
    #Baidu Feipian PaddleSpeech hỗ trợ đào tạo mô hình và triển khai ngoại tuyến tại địa phương.
    #Địa chỉ khung https://www.paddlepaddle.org.cn/
    #Địa chỉ dự án https://github.com/PaddlePaddle/PaddleSpeech
    #SpeechServerDemo https://github.com/PaddlePaddle/PaddleSpeech/tree/develop/demos/speech_server
    #Để phát trực tuyến, vui lòng tham khảo https://github.com/PaddlePaddle/PaddleSpeech/wiki/PaddleSpeech-Server-WebSocket-API
    type: paddle_speech
    protocol: websocket # protocol choices = ['websocket', 'http']
    url: ws://127.0.0.1:8092/paddlespeech/tts/streaming  # TTS 服务的 URL 地址，指向本地服务器 [websocket默认ws://127.0.0.1:8092/paddlespeech/tts/streaming，http默认http://127.0.0.1:8090/paddlespeech/tts]
    spk_id: 0 # ID loa, 0 thường đại diện cho loa mặc định
    speed: 1.0 # Tốc độ nói, 1.0 nghĩa là tốc độ nói bình thường, >1 nghĩa là tăng tốc, <1 nghĩa là chậm lại
    volume: 1.0 # Âm lượng, 1.0 nghĩa là âm lượng bình thường, >1 nghĩa là tăng, <1 nghĩa là giảm
    save_path:   # Lưu đường dẫn
    # ngôn ngữ: "Tiếng Trung" # Chỉ định ngôn ngữ đầu ra, chẳng hạn như: Tiếng Trung, Tiếng Anh, Tiếng Nhật, Tiếng Hàn, v.v. Vui lòng đặt theo ngôn ngữ được hỗ trợ bởi âm đã chọn. Nếu để trống thì mặc định là tiếng Trung.
