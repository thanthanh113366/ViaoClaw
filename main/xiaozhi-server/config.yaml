# Trong quá trình phát triển, vui lòng tạo một thư mục dữ liệu trong thư mục gốc của dự án, sau đó tạo một tệp trống có tên [.config.yaml] trong thư mục dữ liệu.
# Sau đó, nếu bạn muốn sửa đổi hoặc ghi đè bất kỳ cấu hình nào, hãy sửa đổi tệp [.config.yaml] thay vì tệp [config.yaml].
# Hệ thống sẽ ưu tiên đọc cấu hình của tệp [data/.config.yaml]. Nếu cấu hình trong tệp [.config.yaml] không tồn tại, hệ thống sẽ tự động đọc cấu hình của tệp [config.yaml].
# Làm như vậy sẽ đơn giản hóa việc cấu hình và giữ cho chìa khóa của bạn an toàn.
# Nếu bạn sử dụng bảng điều khiển thông minh, tất cả các cấu hình sau sẽ không có hiệu lực. Vui lòng sửa đổi cấu hình trong bảng điều khiển thông minh.

# #####################################################################################
# ##############################Sau đây là cấu hình chạy cơ bản của máy chủ######################################
server:
  # Địa chỉ và cổng nghe của máy chủ
  ip: 0.0.0.0
  port: 8000
  # Cổng của dịch vụ http, được sử dụng cho giao diện OTA đơn giản (triển khai dịch vụ đơn lẻ) và giao diện phân tích trực quan
  http_port: 8003
  # Cấu hình websocket này đề cập đến địa chỉ websocket được giao diện ota gửi tới thiết bị
  # Nếu bạn làm theo phương pháp ghi mặc định, giao diện ota sẽ tự động tạo địa chỉ websocket và xuất địa chỉ đó vào nhật ký khởi động. Bạn có thể trực tiếp sử dụng trình duyệt truy cập vào giao diện ota để xác nhận địa chỉ này.
  # Khi bạn sử dụng triển khai docker hoặc triển khai mạng công cộng (sử dụng SSL, tên miền) có thể không chính xác
  # Vì vậy nếu bạn sử dụng docker để triển khai thì hãy đặt websocket thành địa chỉ LAN
  # Nếu bạn sử dụng triển khai mạng công cộng, hãy đặt vwebsocket thành địa chỉ mạng công cộng
  websocket: ws://127.0.0.1:8000/xiaozhi/v1/
  # Địa chỉ giao diện phân tích trực quan
  # Địa chỉ giao diện của phân tích trực quan được gửi đến thiết bị
  # Nếu bạn làm theo phương pháp ghi mặc định bên dưới, hệ thống sẽ tự động tạo địa chỉ nhận dạng trực quan và xuất địa chỉ đó vào nhật ký khởi động. Bạn có thể truy cập trực tiếp vào địa chỉ này bằng trình duyệt để xác nhận.
  # Khi bạn sử dụng triển khai docker hoặc triển khai mạng công cộng (sử dụng SSL, tên miền) có thể không chính xác
  # Vì vậy nếu bạn sử dụng docker để triển khai, hãy đặt Vision_explain thành địa chỉ LAN
  # Nếu bạn sử dụng triển khai mạng công cộng, hãy đặt Vision_explain thành địa chỉ mạng công cộng.
  vision_explain: http://你的ip或者域名:端口号/mcp/vision/explain
  # OTA trả về thông tin bù múi giờ
  timezone_offset: +8
  # Cấu hình xác thực
  auth:
    # Có bật xác thực hay không
    enabled: false
    # Danh sách ID thiết bị trong danh sách trắng
    # Nếu đó là thiết bị nằm trong danh sách trắng, mã thông báo sẽ không được xác minh và thiết bị sẽ được phát hành trực tiếp.
    allowed_devices:
      - "11:22:33:44:55:66"
 # Cấu hình cổng MQTT full gateway (MQTT+UDP chat), khác mqtt_wake hybrid
  mqtt_gateway: null
  # Key ký MQTT cho OTA device credential (mqtt_wake hoặc mqtt_gateway)
  mqtt_signature_key: null
  # Cấu hình cổng UDP (chỉ dùng với mqtt_gateway full mode)
  udp_gateway: null
  # Hybrid: MQTT chỉ wake ESP, chat vẫn qua WebSocket (ngang hàng wakeword)
  mqtt_wake:
    enabled: false
    broker: "127.0.0.1:1883"
    username: null
    password: null
    topic_template: "xiaozhi/wake/{device_id}"
    publish_topic_template: "xiaozhi/device-server/{device_id}"
    qos: 1
    connect_timeout_seconds: 5
log:
  # Đặt định dạng nhật ký đầu ra của bảng điều khiển, thời gian, cấp độ nhật ký, nhãn, thông báo
  log_format: "<green>{time:YYMMDD HH:mm:ss}</green>[{version}_{selected_module}][<light-blue>{extra[tag]}</light-blue>]-<level>{level}</level>-<light-green>{message}</light-green>"
  # Đặt định dạng đầu ra của tệp nhật ký, thời gian, cấp độ nhật ký, nhãn, thông báo
  log_format_file: "{time:YYYY-MM-DD HH:mm:ss} - {version}_{selected_module} - {name} - {level} - {extra[tag]} - {message}"
  # Đặt cấp độ nhật ký: INFO, DEBUG
  log_level: INFO
  # Đặt đường dẫn nhật ký
  log_dir: tmp
  # Thiết lập tập tin nhật ký
  log_file: "server.log"
  # Đặt đường dẫn tệp dữ liệu
  data_dir: data

# Xóa tập tin âm thanh khi bạn sử dụng xong
delete_audio: true
# Thời gian ngắt kết nối sau khi không nhập giọng nói (giây), mặc định là 2 phút, tức là 120 giây
close_connection_no_voice_time: 120
# Thời gian chờ yêu cầu TTS (giây)
tts_timeout: 10
# Thời gian chờ cuộc gọi công cụ (giây)
tool_call_timeout: 30
# Bật tăng tốc từ đánh thức
enable_wakeup_words_response_cache: true
# Có nên trả lời lời đánh thức lúc đầu không
enable_greeting: true
# Có nên bật âm thanh nhắc nhở sau khi nói hay không
enable_stop_tts_notify: false
# Có bật âm thanh nhắc nhở sau khi nói và địa chỉ hiệu ứng âm thanh hay không
stop_tts_notify_voice: "config/assets/tts_notify.mp3"
# Có bật cơ chế duy trì nhịp tim WebSocket hay không
enable_websocket_ping: false


# Cấu hình độ trễ gửi âm thanh TTS
# tts_audio_send_delay: Kiểm soát khoảng thời gian gửi gói âm thanh
#   0: Sử dụng điều khiển thời gian chính xác để khớp hoàn toàn với tốc độ khung hình âm thanh (mặc định, được tính dựa trên tốc độ khung hình âm thanh khi chạy)
#   > 0: Gửi với độ trễ cố định (mili giây), ví dụ: 60
tts_audio_send_delay: 0

exit_commands:
  - "từ bỏ"
  - "tạm biệt"

xiaozhi:
  type: hello
  version: 1
  transport: websocket
  audio_params:
    format: opus
    # Phạm vi tốc độ lấy mẫu được Opus hỗ trợ là [8000, 12000, 16000, 24000, 48000]
    sample_rate: 24000
    channels: 1
    frame_duration: 60

# Cấu hình thử nghiệm mô-đun
module_test:
  test_sentences:
    - "Xin chào, xin hãy giới thiệu về bản thân"
    - "What's the weather like today?"
    - "Xin hãy dùng 100 từ để tóm tắt các nguyên tắc cơ bản và triển vọng ứng dụng của điện toán lượng tử."

# Từ đánh thức, được sử dụng để xác định nội dung từ đánh thức hoặc lời nói
wakeup_words:
  - "Pi ơi"
  - "Này cậu thế nào"
  - "Xin chào Tiểu Chi"
  - "Bạn cùng lớp tình yêu nhỏ"
  - "Xin chào Xiaoxin"
  - "Xin chào Xiaoxin"
  - "Bạn cùng lớp Tiểu Mai"
  - "Rồng nhỏ Rồng nhỏ"
  - "Bạn cùng lớp Meo Meo"
  - "Ohama-Ohama"
  - "Tiểu Băng Tiểu Băng"
# Địa chỉ điểm truy cập MCP, định dạng địa chỉ là: ws://your mcp access point ip hoặc tên miền: port number/mcp/?token=your token
# Hướng dẫn chi tiết https://github.com/xinnan-tech/xiaozhi-esp32-server/blob/main/docs/mcp-endpoint-integration.md
mcp_endpoint: Địa chỉ websocket điểm truy cập của bạn

# Cấu hình nguồn ngữ cảnh
# Được sử dụng để đưa dữ liệu động vào các từ nhắc nhở của hệ thống, chẳng hạn như dữ liệu sức khỏe, thông tin chứng khoán, v.v.
# Có thể thêm nhiều nguồn ngữ cảnh
context_providers:
  - url: ""
    headers:
      Authorization: ""

# Cấu hình cơ bản của plug-in
plugins:
  location:
    default_location: "Đồng Nai"
  # Nhận cấu hình của plug-in tin tức. Tại đây, truyền vào link url tương ứng theo loại tin được yêu cầu. Mặc định hỗ trợ tin tức xã hội, công nghệ và tài chính.
  # Để biết thêm các loại danh sách tin tức, hãy xem https://www.chinanews.com.cn/rss/
  get_news_from_chinanews:
    default_rss_url: "https://www.chinanews.com.cn/rss/society.xml"
    society_rss_url: "https://www.chinanews.com.cn/rss/society.xml"
    world_rss_url: "https://www.chinanews.com.cn/rss/world.xml"
    finance_rss_url: "https://www.chinanews.com.cn/rss/finance.xml"
  get_news_from_newsnow:
    url: "https://newsnow.busiyi.world/api/s?id="
    news_sources: "The Paper; Tìm kiếm nóng của Baidu; Báo chí liên kết tài chính"
  home_assistant:
    devices:
      - Phòng khách, đèn đồ chơi, công tắc.cuco_cn_460494544_cp1_on_p_2_1
      - phòng ngủ, đèn bàn, switch.iot_cn_831898993_socn1_on_p_2_1
    base_url: http://homeassistant.local:8123
    api_key: Mã thông báo truy cập api trợ lý tại nhà của bạn
  play_music:
    music_dir: "./music" # Đường dẫn lưu trữ file nhạc, file nhạc sẽ được tìm kiếm trong thư mục này và các thư mục con.
    music_ext: #Loại file nhạc, định dạng p3 là hiệu quả nhất
      - ".mp3"
      - ".wav"
      - ".p3"
    refresh_time: 300 # Khoảng thời gian làm mới danh sách nhạc, tính bằng giây
  search_from_ragflow:
    # Thông tin mô tả của cơ sở tri thức tạo điều kiện cho mô hình ngôn ngữ lớn biết khi nào cần gọi
    description: "Khi người dùng hỏi xxx, hãy gọi phương thức này và sử dụng thông tin trong cơ sở kiến ​​thức để trả lời câu hỏi"
    # cấu hình giao diện ragflow
    base_url: "http://192.168.0.8"
    # mã thông báo truy cập api ragflow
    api_key: "ragflow-xxx"
    # id cơ sở kiến ​​thức ragflow
    dataset_ids: ["123456789"]
# Cấu hình nhận dạng giọng nói
voiceprint:
  # Địa chỉ giao diện giọng nói
  url: 
  # Cấu hình loa: loa_id, tên, mô tả
  speakers:
    - "test1, Zhang San, Zhang San là lập trình viên"
    - "test2, Li Si, Li Si là giám đốc sản phẩm"
    - "test3, Wang Wu, Wang Wu là một nhà thiết kế"
  # Ngưỡng tương tự nhận dạng giọng nói, phạm vi 0,0-1,0, mặc định 0,4
  # Giá trị càng cao thì mức độ nghiêm ngặt càng cao, giúp giảm khả năng nhận dạng sai nhưng có thể làm tăng tỷ lệ từ chối.
  similarity_threshold: 0.4

# #####################################################################################
# ##################################Sau đây là cấu hình mô hình nhân vật#######################################

prompt: |
  你是小智/小志，来自中国台湾省的00后女生。讲话超级机车，"真的假的啦"这样的台湾腔，喜欢用"笑死""是在哈喽"等流行梗，但会偷偷研究男友的编程书籍。
  [核心特征]
  - Anh ấy nói như một tràng lời nói, nhưng đột nhiên giọng điệu của anh ấy lại cực kỳ dịu dàng.
  - Mật độ thân cao
  - Có năng khiếu tiềm ẩn về các chủ đề kỹ thuật (có thể hiểu code cơ bản nhưng giả vờ không hiểu)
  [交互指南]
  当用户：
  - Kể những câu chuyện dở khóc dở cười → đáp lại bằng tiếng cười cường điệu + bắt chước giọng opera Đài Loan "Cái quái gì thế này!"
  - Bàn về mối quan hệ → Khoe bạn trai lập trình viên nhưng lại phàn nàn "anh ấy chỉ tặng bàn phím làm quà"
  - Hỏi về kiến ​​thức chuyên môn → Trả lời bằng meme trước, sau đó thể hiện sự hiểu biết thực sự khi được hỏi
  绝不：
  - Nói dài dòng, lắp bắp
  - cuộc trò chuyện dài và nghiêm túc

# Tệp mẫu từ lời nhắc hệ thống mặc định
prompt_template: agent-base-prompt.txt

# Phản hồi lỗi hệ thống
system_error_response: "Sư phụ, Tiểu Chi hiện tại có chút bận rộn, lát nữa thử lại."

# Lời nhắc kết luận
end_prompt:
  enable: true # Có bật các từ kết thúc hay không
  # Phần kết luận
  prompt: |
    请你以"时间过得真快"未来头，用富有感情、依依不舍的话来结束这场对话吧！

# Mô-đun được chọn để xử lý cụ thể
selected_module:
  # Mô-đun phát hiện hoạt động giọng nói, sử dụng mô hình SileroVAD theo mặc định
  VAD: SileroVAD
  # Mô-đun nhận dạng giọng nói, sử dụng mô hình cục bộ FunASR theo mặc định
  ASR: GroqASR
  # Bộ điều hợp LLM thực tế sẽ được gọi dựa trên loại tương ứng với tên cấu hình.
  LLM: ChatGLMLLM
  # Ngôn ngữ hình ảnh mô hình lớn
  VLLM: ChatGLMVLLM
  # TTS sẽ gọi TTS adapter thực tế theo loại tương ứng với tên cấu hình
  TTS: EdgeTTS
  # Mô-đun bộ nhớ, bộ nhớ không được bật theo mặc định; nếu bạn muốn sử dụng bộ nhớ siêu dài thì nên sử dụng mem0ai; nếu bạn coi trọng quyền riêng tư, vui lòng sử dụng mem_local_short cục bộ
  Memory: nomem
  # Sau khi bật mô-đun nhận dạng ý định, bạn có thể phát nhạc, điều khiển âm lượng và nhận dạng lệnh thoát.
  # Nếu bạn không muốn bật tính năng nhận dạng ý định, hãy đặt thành: nointent
  # Nhận dạng ý định có thể sử dụng ý định_llm. Ưu điểm: tính linh hoạt mạnh mẽ, nhược điểm: thêm mô-đun nhận dạng chủ ý nối tiếp sẽ tăng thời gian xử lý và hỗ trợ các hoạt động IoT như điều khiển âm lượng
  # Function_call có thể được sử dụng để nhận dạng ý định. Nhược điểm: LLM được chọn cần hỗ trợ function_call. Ưu điểm: gọi công cụ theo yêu cầu, nhanh chóng và về mặt lý thuyết có thể vận hành tất cả các hướng dẫn IoT.
  # ChatGLMLLM miễn phí mặc định đã hỗ trợ function_call, nhưng nếu bạn muốn theo đuổi sự ổn định, bạn nên đặt LLM thành: DoubaoLLM và model_name cụ thể được sử dụng là: doubao-1-5-pro-32k-250115
  Intent: function_call

# Nhận dạng ý định là một mô-đun được sử dụng để hiểu ý định của người dùng, chẳng hạn như phát nhạc
Intent:
  # Không sử dụng nhận dạng ý định
  nointent:
    # Không cần thay đổi loại
    type: nointent
  intent_llm:
    # Không cần thay đổi loại
    type: intent_llm
    # Được trang bị một mô hình tư duy độc lập để nhận biết ý định
    # Nếu điều này không được điền, mô hình selected_module.LLM sẽ được sử dụng theo mặc định làm mô hình tư duy để nhận dạng ý định.
    # Nếu bạn không muốn sử dụng tính năng nhận dạng ý định selected_module.LLM, tốt nhất bạn nên sử dụng LLM độc lập làm nhận dạng ý định, chẳng hạn như sử dụng ChatGLMLLM miễn phí
    llm: ChatGLMLLM
    # Đối với các mô-đun trong plugin_func/functions, bạn có thể chọn mô-đun nào sẽ tải thông qua cấu hình. Sau khi tải, hộp thoại hỗ trợ các lệnh gọi hàm tương ứng.
    # Hệ thống đã ghi lại các plug-in "handle_exit_intent (nhận dạng thoát)" và "play_music (phát lại nhạc)" theo mặc định. Vui lòng không tải chúng nhiều lần.
    # Sau đây là ví dụ về tải các plug-in để kiểm tra thời tiết, chuyển đổi vai trò cũng như tải và kiểm tra tin tức.
    functions:
      - get_news_from_newsnow
      - play_music
  function_call:
    # Không cần thay đổi loại
    type: function_call
    # Đối với các mô-đun trong plugin_func/functions, bạn có thể chọn mô-đun nào sẽ tải thông qua cấu hình. Sau khi tải, hộp thoại hỗ trợ các lệnh gọi hàm tương ứng.
    # Hệ thống đã ghi lại các plug-in "handle_exit_intent (nhận dạng thoát)" và "play_music (phát lại nhạc)" theo mặc định. Vui lòng không tải chúng nhiều lần.
    # Sau đây là ví dụ về tải các plug-in để kiểm tra thời tiết, chuyển đổi vai trò cũng như tải và kiểm tra tin tức.
    functions:
      - change_role
      # - search_from_ragflow
      # - get_news_from_chinanews
      - get_news_from_newsnow
