    # Mở địa chỉ https://console.volcengine.com/speech/service/10011
    # Nói chung, trả tiền cho mỗi lần xem rẻ hơn, nhưng DoubaoStreamASR sử dụng công nghệ mô hình lớn và mang lại kết quả tốt hơn.
