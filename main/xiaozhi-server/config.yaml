    access_key_secret: Tài khoản Alibaba Cloud của bạn access_key_secret
    # Lựa chọn khu vực máy chủ, bạn có thể chọn máy chủ gần hơn để giảm độ trễ, chẳng hạn như nls-gateway-cn-hangzhou.aliyuncs.com (Hàng Châu), v.v.
    host: nls-gateway-cn-shanghai.aliyuncs.com
    # Thời gian phát hiện phân đoạn câu (mili giây), kiểm soát thời gian tắt tiếng trước khi phân đoạn câu, mặc định là 800 mili giây
    max_sentence_silence: 800
    output_dir: tmp/
  BaiduASR:
    # Nhận AppID, Khóa API, Khóa bí mật: https://console.bce.baidu.com/ai-engine/old/#/ai/speech/app/list
    # Kiểm tra hạn ngạch tài nguyên: https://console.bce.baidu.com/ai-engine/old/#/ai/speech/overview/resource/list
    type: baidu
    app_id: ID ứng dụng công nghệ giọng nói Baidu của bạn
    api_key: Khóa API công nghệ giọng nói Baidu của bạn
    secret_key: Công nghệ giọng nói Baidu của bạn SecretKey
    # Thông số ngôn ngữ, 1537 là tiếng phổ thông, tham khảo cụ thể: https://ai.baidu.com/ai-doc/SPEECH/0lbxfnc9b
    dev_pid: 1537
    output_dir: tmp/
  OpenaiASR:
    # Đối với dịch vụ nhận dạng giọng nói OpenAI, trước tiên bạn cần tạo một tổ chức trên nền tảng OpenAI và lấy api_key
    # Hỗ trợ nhận dạng giọng nói tiếng Trung, tiếng Anh, tiếng Nhật, tiếng Hàn và các ngôn ngữ khác, vui lòng tham khảo tài liệu https://platform.openai.com/docs/guides/speech-to-text để biết chi tiết
    # Cần có kết nối Internet
    # Các bước ứng dụng:
    # 1. Đăng nhập vào Nền tảng OpenAI. https://auth.openai.com/log-in
    # 2. Tạo khóa api https://platform.openai.com/settings/ Organisation/api-keys
    # 3. Model có thể chọn gpt-4o-transcribe hoặc GPT-4o mini Transcribe
    type: openai
    api_key: Khóa API OpenAI của bạn
    base_url: https://api.openai.com/v1/audio/transcriptions
    model_name: gpt-4o-mini-transcribe
    output_dir: tmp/
  GroqASR:
    # Đối với dịch vụ nhận dạng giọng nói Groq, trước tiên bạn cần tạo khóa API trong Groq Console.
    # Các bước ứng dụng:
    # 1. Đăng nhập vào Groq Console. https://console.groq.com/home
    # 2. Tạo khóa api https://console.groq.com/keys
    # 3. Model có thể chọn thì thầm-large-v3-turbo hoặc thì thầm-large-v3 (ditil-whisper-large-v3-en chỉ hỗ trợ phiên âm tiếng Anh)
    type: openai
    api_key: Khóa API Groq của bạn
    base_url: https://api.groq.com/openai/v1/audio/transcriptions
    model_name: whisper-large-v3-turbo
    output_dir: tmp/
  VoskASR:
    # Trang web chính thức: https://alphacephei.com/vosk/
    # Hướng dẫn cấu hình:
    # 1. VOSK là thư viện nhận dạng giọng nói ngoại tuyến hỗ trợ nhiều ngôn ngữ
    # 2. Trước tiên, bạn cần tải xuống tệp mô hình: https://alphacephei.com/vosk/models
    # 3. Đối với model Trung Quốc, nên sử dụng vosk-model-small-cn-0.22 hoặc vosk-model-cn-0.22
    # 4. Chạy hoàn toàn offline, không cần kết nối mạng
    # 5. File đầu ra được lưu trong thư mục tmp/
    # Các bước sử dụng:
    # 1. Truy cập https://alphacephei.com/vosk/models để tải xuống model tương ứng
    # 2. Giải nén tệp mô hình vào thư mục models/vosk/ trong thư mục dự án
    # 3. Chỉ định đường dẫn mô hình chính xác trong cấu hình
    # 4. Lưu ý: Đầu ra mẫu tiếng Trung VOSK không có dấu chấm câu và sẽ có khoảng cách giữa các từ.
    type: vosk
    model_path: Đường dẫn mô hình của bạn, chẳng hạn như: models/vosk/vosk-model-small-cn-0.22
    output_dir: tmp/
  Qwen3ASRFlash:
    # Dịch vụ nhận dạng giọng nói Tongyi Qianwen Qwen3-ASR-Flash trước tiên yêu cầu tạo khóa API trên nền tảng Alibaba Cloud Bailian
    # Các bước ứng dụng:
    # 1. Đăng nhập vào nền tảng Alibaba Cloud Bailian. https://bailian.console.aliyun.com/
    # 2. Tạo API-KEY https://bailian.console.aliyun.com/#/api-key
    # 3.Qwen3-ASR-Flash dựa trên cơ sở đa phương thức Tongyi Qianwen và hỗ trợ nhận dạng đa ngôn ngữ, nhận dạng giọng hát, loại bỏ tiếng ồn và các chức năng khác
    type: qwen3_asr_flash
    api_key: Khóa API Bailian trên nền tảng đám mây Alibaba của bạn
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model_name: qwen3-asr-flash
    output_dir: tmp/
    # Cấu hình tùy chọn ASR
    enable_lid: true # Tự động phát hiện ngôn ngữ
    enable_itn: true # Chuẩn hóa văn bản nghịch đảo
    #ngôn ngữ: "zh" # Ngôn ngữ, hỗ trợ zh, en, ja, ko, v.v.
    context: "" #Thông tin bối cảnh, được sử dụng để cải thiện độ chính xác nhận dạng, không quá 10000 Token
  XunfeiStreamASR:
    # Dịch vụ nhận dạng giọng nói trực tuyến iFlytek
    # Trước tiên, bạn cần tạo một ứng dụng trên nền tảng mở iFlytek và lấy thông tin chứng nhận sau
    # Địa chỉ nền tảng mở iFlytek: https://www.xfyun.cn/
    # Sau khi tạo ứng dụng, hãy vào "Ứng dụng của tôi":
    # - APPID
    # - APISecret  
    # - APIKey
    type: xunfei_stream
    # Các thông số bắt buộc - Thông tin ứng dụng nền tảng mở iFLYTEK
    app_id: ỨNG DỤNG của bạn
    api_key: Khóa API của bạn
    api_secret: APISecret của bạn
    # Xác định cấu hình tham số
    domain: slm # Xác định lĩnh vực, iat: ngôn ngữ hàng ngày, y tế: điều trị y tế, tài chính: tài chính, v.v.
    language: zh_cn # Ngôn ngữ, zh_cn: tiếng Trung, en_us: tiếng Anh
    accent: quan thoại # Phương ngữ, quan thoại: tiếng phổ thông
    # Điều chỉnh các thông số xử lý âm thanh để cải thiện chất lượng nhận dạng giọng nói dài
    output_dir: tmp/
  AliyunBLStreamASR:
    # Dịch vụ nhận dạng giọng nói theo thời gian thực của Alibaba Bailian Paraformer
    # Nhận dạng giọng nói phát trực tuyến thời gian thực WebSocket hỗ trợ đa ngôn ngữ, tùy chỉnh từ nóng, phân đoạn ngữ nghĩa và các chức năng nâng cao khác
    # Địa chỉ nền tảng: https://bailian.console.aliyun.com/
    # Địa chỉ khóa API: https://bailian.console.aliyun.com/#/api-key
    # Địa chỉ tài liệu: https://help.aliyun.com/zh/model-studio/websocket-for-paraformer-real-time-service
    # Các mẫu được hỗ trợ: paraformer-realtime-v2 (được khuyến nghị), paraformer-realtime-8k-v2, paraformer-realtime-v1, paraformer-realtime-8k-v1
    type: aliyunbl_stream
    # Thông số bắt buộc
    api_key: Khóa API Bailian trên nền tảng đám mây Alibaba của bạn
    # Lựa chọn mô hình, nên sử dụng phiên bản v2
    model: paraformer-realtime-v2
    # Định dạng âm thanh và tốc độ mẫu
    format: pcm
    sample_rate: 16000#v2 hỗ trợ mọi tốc độ lấy mẫu, v1 chỉ hỗ trợ 16000 và phiên bản 8k chỉ hỗ trợ 8000
    # Thông số tùy chọn
    disfluency_removal_enabled: false # Có lọc các hạt phương thức hay không (chẳng hạn như "ừm", "ah", v.v.)
    semantic_punctuation_enabled: false # Phân đoạn câu theo ngữ nghĩa (true: cảnh hội nghị, chính xác; false: Phân đoạn câu VAD, cảnh tương tác, độ trễ thấp)
    max_sentence_silence: 200 # VAD ngưỡng thời gian im lặng phân đoạn câu (ms), phạm vi 200-6000, chỉ có hiệu lực khi phân đoạn câu VAD
    multi_threshold_mode_enabled: false # Ngăn phân đoạn câu VAD quá dài, nó chỉ có hiệu lực khi sử dụng phân đoạn câu VAD
    punctuation_prediction_enabled: true # Có tự động thêm dấu chấm câu hay không
    inverse_text_normalization_enabled: true # Có bật ITN hay không (chuyển đổi chữ số Trung Quốc sang chữ số Ả Rập)
    # Địa chỉ tài liệu tùy chỉnh từ nóng: https://help.aliyun.com/zh/model-studio/custom-hot-words?
    # từ vựng_id: vocab-xxx-24ee19fa8cfb4d52902170a0xxxxxxxx # ID từ nóng (tùy chọn)
    # ngôn ngữ_hints: ["zh", "en"] # Chỉ định ngôn ngữ (tùy chọn), hỗ trợ zh, en, ja, yue, ko, de, fr, ru
    output_dir: tmp/  
VAD:
  SileroVAD:
    type: silero
    threshold: 0.5
    threshold_low: 0.3
    model_dir: models/snakers4_silero-vad
    min_silence_duration_ms: 200 # Nếu thời gian tạm dừng lời nói tương đối dài, bạn có thể đặt giá trị này lớn hơn

LLM:
  # Tất cả các loại openai đều có thể sửa đổi các tham số siêu, lấy AliLLM làm ví dụ
  # Các loại hiện được hỗ trợ là openai, dify và ollama, bạn có thể tự điều chỉnh.
  AliLLM:
    # Xác định các loại API LLM
    type: openai
    # Api_key của bạn có thể được tìm thấy ở đây https://bailian.console.aliyun.com/?apiKey=1#/api-key
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model_name: qwen-flash
    api_key: Khóa web tìm kiếm sâu của bạn
    temperature: 0,7 # Giá trị nhiệt độ
    max_tokens: 500 # Số lượng mã thông báo được tạo tối đa
    top_p: 1
    frequency_penalty: 0 # Tần suất phạt
  AliAppLLM:
    # Xác định các loại API LLM
    type: AliBL
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    app_id: app_id của bạn
    # Api_key của bạn có thể được tìm thấy ở đây https://bailian.console.aliyun.com/?apiKey=1#/api-key
    api_key: api_key của bạn
    # Có nên sử dụng lời nhắc cục bộ hay không: true|false (nếu không được sử dụng, vui lòng đặt lời nhắc trong ứng dụng Bailian)
    is_no_prompt: true
    # Ali_memory_id: sai (không được sử dụng) | Memory_id của bạn (vui lòng lấy nó trong cài đặt của ứng dụng Bailian)
    # Lời khuyên! : Ali_memory không triển khai bộ nhớ lưu trữ nhiều người dùng (bộ nhớ được gọi bằng id)
    ali_memory_id: false
  DoubaoLLM:
    # Xác định các loại API LLM
    type: openai
    # Trước tiên hãy kích hoạt dịch vụ, mở URL sau, tìm kiếm Doubao-1.5-pro cho dịch vụ đã kích hoạt và kích hoạt nó
    # Địa chỉ mở: https://console.volcengine.com/ark/khu vực:ark+cn-beijing/openQuản lý?LLM=%7B%7D&OpenTokenDrawer=false
    # Hạn ngạch miễn phí 500000token
    # Sau khi kích hoạt thì vào đây lấy key: https://console.volcengine.com/ark/khu vực:ark+cn-beijing/apiKey?apikey=%7B%7D
    base_url: https://ark.cn-beijing.volces.com/api/v3
    model_name: doubao-1-5-pro-32k-250115
    api_key: Khóa web doubao của bạn
  DeepSeekLLM:
    # Xác định các loại API LLM
    type: openai
    # Khóa api của bạn có thể được tìm thấy ở đây https://platform.deepseek.com/
    model_name: deepseek-chat
    url: https://api.deepseek.com
    api_key: Khóa web tìm kiếm sâu của bạn
  ChatGLMLLM:
    # Xác định các loại API LLM
    type: openai
    # glm-4-flash miễn phí nhưng bạn vẫn cần đăng ký và điền api_key
    # Bạn có thể tìm thấy khóa api của mình tại đây https://bigmodel.cn/usercenter/proj-mgmt/apikeys
    model_name: glm-4-flash
    url: https://open.bigmodel.cn/api/paas/v4/
    api_key: khóa web chat-glm của bạn
  OllamaLLM:
    # Xác định các loại API LLM
    type: ollama
    model_name: qwen2.5 # Tên model được sử dụng cần được tải xuống trước bằng ollama pull
    base_url: http://localhost:11434  # Ollama服务地址
  DifyLLM:
    # Xác định các loại API LLM
    type: dify
    # Nên sử dụng giao diện dify được triển khai cục bộ. Quyền truy cập vào giao diện đám mây công cộng dify có thể bị hạn chế ở một số khu vực của đất nước.
    # Nếu bạn sử dụng DifyLLM, lời nhắc (từ nhắc) trong tệp cấu hình không hợp lệ và bạn cần đặt từ nhắc trong bảng điều khiển lặn.
    base_url: https://api.dify.ai/v1
    api_key: Khóa web DifyLLM của bạn
    # Chế độ hội thoại được sử dụng Có thể chọn quy trình công việc/chạy tin nhắn trò chuyện ở chế độ hội thoại Tin nhắn hoàn thành tạo văn bản
    # Khi sử dụng quy trình công việc để trả về, tham số đầu vào là truy vấn và tên của tham số trả về phải được đặt thành câu trả lời.
    # Tham số đầu vào mặc định để tạo văn bản cũng là truy vấn
    mode: chat-messages
  GeminiLLM:
    type: gemini
    # API Google Gemini, trước tiên bạn cần tạo khóa API trong bảng điều khiển Google Cloud và lấy api_key
    # Nếu được sử dụng ở Trung Quốc, vui lòng tuân thủ "Các biện pháp tạm thời để quản lý dịch vụ trí tuệ nhân tạo sáng tạo"
    # Địa chỉ ứng dụng mã thông báo: https://aistudio.google.com/apikey
    # Nếu trang triển khai không thể truy cập vào giao diện, bạn cần kích hoạt truy cập Internet khoa học.
    api_key: Khóa web gemini của bạn
    model_name: "gemini-2.0-flash"
    http_proxy: ""  #"http://127.0.0.1:10808"
    https_proxy: "" #http://127.0.0.1:10808"
  CozeLLM:
    # Xác định các loại API LLM
    type: coze
    # Bạn có thể tìm thấy token cá nhân tại đây
    # https://www.coze.cn/open/oauth/pats
    # Nội dung của bot_id và user_id được viết trong dấu ngoặc kép
    bot_id: "bot_id của bạn"
    user_id: "id_người dùng của bạn"
    personal_access_token: mã thông báo cá nhân coze của bạn
  VolcesAiGatewayLLM:
    # Động cơ núi lửa - Cổng mô hình lớn cạnh
    # Xác định các loại API LLM
    type: openai
    # Đầu tiên hãy kích hoạt dịch vụ, mở URL sau, tạo khóa truy cập cổng, tìm kiếm và kiểm tra Doubao-pro-32k-functioncall, kích hoạt
    # Nếu bạn cần sử dụng tính năng tổng hợp giọng nói do cổng mô hình lớn biên cung cấp, hãy kiểm tra cả tính năng tổng hợp giọng nói của Doubao. Xem thêm cấu hình TTS.VolcesAiGatewayTTS
    # https://console.volcengine.com/vei/aigateway/
    # Kích hoạt xong vào đây lấy key: https://console.volcengine.com/vei/aigateway/tokens-list
    base_url: https://ai-gateway.vei.volces.com/v1
    model_name: doubao-pro-32k-functioncall
    api_key: Khóa truy cập cổng của bạn
  LMStudioLLM:
    # Xác định các loại API LLM
    type: openai
    model_name: deepseek-r1-distill-llama-8b@q4_k_m #Tên mô hình được sử dụng cần phải được tải xuống trước từ cộng đồng
    url: http://localhost:1234/v1 # LM Studio服务地址
    api_key: lm-studio # Cố định API Key của dịch vụ LM Studio
  HomeAssistant:
    # Xác định các loại API LLM
    type: homeassistant
    base_url: http://homeassistant.local:8123
    agent_id: conversation.chatgpt
    api_key: Mã thông báo truy cập api trợ lý tại nhà của bạn
  FastgptLLM:
    # Xác định các loại API LLM
    type: fastgpt
    # Nếu bạn sử dụng fastgpt, lời nhắc (từ nhắc) trong tệp cấu hình không hợp lệ và bạn cần đặt từ nhắc trong bảng điều khiển fastgpt.
    base_url: https://host/api/v1
    # Bạn có thể tìm thấy api_key của mình tại đây
    # https://cloud.tryfastgpt.ai/account/apikey
    api_key: khóa fastgpt của bạn
    variables:
      k: "v"
      k2: "v2"
  XinferenceLLM:
    # Xác định các loại API LLM
    type: xinference
    # Địa chỉ dịch vụ xinference và tên model
    model_name: qwen2.5:72b-AWQ # Tên model được sử dụng, model tương ứng cần được khởi động trước trong Xinference
    base_url: http://localhost:9997  # Xinference服务地址
  XinferenceSmallLLM:
    # Xác định các loại API LLM nhẹ để nhận dạng ý định
    type: xinference
    # Địa chỉ dịch vụ xinference và tên model
    model_name: qwen2.5:3b-AWQ # Tên mô hình nhỏ được sử dụng để nhận dạng ý định
    base_url: http://localhost:9997  # Xinference服务地址
# Cấu hình VLLM (mô hình ngôn ngữ trực quan lớn)
VLLM:
  ChatGLMVLLM:
