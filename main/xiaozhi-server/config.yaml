    enable_multilingual: False
    # Nhận dạng đa ngôn ngữ Khi khóa này trống, mô hình sẽ hỗ trợ nhận dạng bằng tiếng Trung, tiếng Anh, tiếng Thượng Hải, tiếng Phúc Kiến, tiếng Tứ Xuyên, Thiểm Tây và tiếng Quảng Đông. Khi được đặt thành một khóa cụ thể, nó sẽ nhận dạng ngôn ngữ được chỉ định.
    # Để biết danh sách ngôn ngữ chi tiết, hãy tham khảo https://www.volcengine.com/docs/6561/1354869
    # language: zh-cn
    # Thời gian phán đoán im lặng (ms), mặc định 200ms
    end_window_size: 200
    output_dir: tmp/
