Memory:
  mem0ai:
    type: mem0ai
    # https://app.mem0.ai/dashboard/api-keys
    # 1000 cuộc gọi miễn phí mỗi tháng
    api_key: Khóa api mem0ai của bạn
  powermem:
    # PowerMem là thành phần bộ nhớ tác nhân nguồn mở của OceanBase, thực hiện tóm tắt bộ nhớ thông qua LLM cục bộ.
    # Lưu ý về chi phí: Bản thân PowerMem là miễn phí, chi phí thực tế phụ thuộc vào LLM và cơ sở dữ liệu đã chọn
    # - Sử dụng sqlite + LLM miễn phí (chẳng hạn như glm-4-flash) = hoàn toàn miễn phí
    # - Sử dụng LLM đám mây hoặc cơ sở dữ liệu đám mây = tính phí theo dịch vụ tương ứng
    # GitHub: https://github.com/oceanbase/powermem
    # Trang web chính thức: https://www.powermem.ai/
    # Ví dụ sử dụng: https://github.com/oceanbase/powermem/tree/main/examples
    type: powermem
    # Có bật chức năng chân dung người dùng hay không
    # - false: Sử dụng chế độ bộ nhớ bình thường (AsyncMemory)
    # - true: Sử dụng chế độ chân dung người dùng (UserMemory) để tự động trích xuất thông tin người dùng
    # Hỗ trợ chức năng chân dung người dùng: Oceanbase, seekdb, sqlite (powermem 0.3.0+)
    enable_user_profile: true
    # ========== Cấu hình LLM ===========
    # Tongyi Qianwen: https://bailian.console.aliyun.com/?apiKey=1#/api-key
    # Apikeys AI (miễn phí): https://bigmodel.cn/usercenter/proj-mgmt/apikeys
    llm:
      provider: openai # Tùy chọn: qwen, openai, zhipu, v.v.
      config:
        api_key: Khóa API LLM của bạn
        model: qwen-plus
        # openai_base_url: https://api.openai.com/v1 # Tùy chọn, địa chỉ dịch vụ tùy chỉnh
    # ========== Cấu hình nhúng ===========
    embedder:
      provider: openai # Tùy chọn: qwen, openai, v.v.
      config:
        api_key: Khóa API mô hình được nhúng của bạn
        model: text-embedding-v4
        openai_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
        # embedding_dims: 1024 # Kích thước vectơ, cần phải cấu hình nếu không phải là 1536

    # ========== Cấu hình cơ sở dữ liệu ==========
    # Oceanbase (được khuyến nghị, hiệu suất tốt nhất), seekdb (được đề xuất, bộ lưu trữ ứng dụng AI tích hợp), postgres, sqlite (thay thế nhẹ)
    # Hỗ trợ chức năng chân dung người dùng: Oceanbase, seekdb, sqlite
    vector_store:
      provider: sqlite
      config: {} # SQLite không yêu cầu cấu hình bổ sung
      # Ví dụ cấu hình OceanBase:
      # provider: oceanbase
      # config:
      #   host: 127.0.0.1
      #   port: 2881
      #   user: root@test
      #   password: your_password
      #   db_name: powermem
      #   Collection_name: bộ nhớ #Tên bảng mặc định. Nếu thứ nguyên được tạo không chính xác, vui lòng xóa bảng này hoặc đổi tên.
      #   embedding_model_dims: 1024 # Nhúng kích thước vectơ, chú ý thích ứng với mô hình được sử dụng, lấy Zhipu làm ví dụ: kích thước của embedding-2 là 1024 và kích thước của embedding-3 là 2048
  nomem:
    # Nếu bạn không muốn sử dụng chức năng bộ nhớ, bạn có thể sử dụng nomem
    type: nomem
  mem_local_short:
    # Chức năng bộ nhớ cục bộ, thông qua tóm tắt llm của selected_module, dữ liệu được lưu trong máy chủ cục bộ và sẽ không được tải lên máy chủ bên ngoài
    type: mem_local_short
    # Được trang bị bộ nhớ để lưu trữ các mô hình tư duy độc lập
    # Nếu điều này không được điền, mô hình selected_module.LLM sẽ được sử dụng theo mặc định làm mô hình tư duy để nhận dạng ý định.
    # Nếu bạn không muốn sử dụng bộ lưu trữ bộ nhớ selected_module.LLM, tốt hơn là nên sử dụng LLM độc lập để nhận dạng ý định, chẳng hạn như sử dụng ChatGLMLLM miễn phí
    llm: ChatGLMLLM

ASR:
