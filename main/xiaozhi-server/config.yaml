    cluster: volcengine_input_common
    # Từ nóng và quá trình sử dụng từ thay thế: https://www.volcengine.com/docs/6561/155738
    boosting_table_name: (Tùy chọn) Tên tệp từ nóng của bạn
    correct_table_name: (Tùy chọn) Tên tệp từ thay thế của bạn
