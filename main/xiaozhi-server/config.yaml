    base_url: https://ark.cn-beijing.volces.com/api/v3
    model_name: lite
    api_key: api_password của bạn
TTS:
  # Các loại hiện được hỗ trợ là edge và doubao, bạn có thể tự điều chỉnh.
  EdgeTTS:
    # Xác định các loại API TTS
    type: edge
    voice: zh-CN-XiaoxiaoNeural
    output_dir: tmp/
    # ngôn ngữ: "Tiếng Trung" # Chỉ định ngôn ngữ đầu ra, chẳng hạn như: Tiếng Trung, Tiếng Anh, Tiếng Nhật, Tiếng Hàn, v.v. Vui lòng đặt theo ngôn ngữ được hỗ trợ bởi âm đã chọn. Nếu để trống thì mặc định là tiếng Trung.
  DoubaoTTS:
    # Xác định các loại API TTS
    type: doubao
    # Đối với dịch vụ tổng hợp giọng nói của Volcano Engine, trước tiên bạn cần tạo một ứng dụng trong bảng điều khiển Volcano Engine và lấy appid và access_token.
    # Mountain Engine Voice phải được mua và trả phí. Giá khởi điểm là 30 nhân dân tệ, có thể sử dụng cho 100 lần giao dịch đồng thời. Nếu bạn sử dụng cái miễn phí chỉ có 2 concurrency thì thường sẽ báo lỗi tts.
    # Sau khi mua dịch vụ, bạn có thể phải đợi khoảng nửa giờ để sử dụng âm thanh miễn phí.
