  FunASRServer:
    # Triển khai FunASR độc lập và sử dụng dịch vụ API của FunASR chỉ cần 5 câu
    # Câu đầu tiên: mkdir -p ./funasr-runtime-resources/models
    # Câu thứ hai: sudo docker run -p 10096:10095 -it --privileged=true -v $PWD/funasr-runtime-resources/models:/workspace/models register.cn-hangzhou.aliyuncs.com/funasr_repo/funasr:funasr-runtime-sdk-online-cpu-0.1.12
    # Sau khi câu trước được thực thi sẽ vào container, tiếp tục với câu thứ 3: cd FunASR/runtime
    # Không thoát khỏi container, tiếp tục thực hiện câu thứ tư trong container: nohup bash run_server_2pass.sh --download-model-dir /workspace/models --vad-dir damo/speech_fsmn_vad_zh-cn-16k-common-onnx --model-dir iic/SenseVoiceSmall-onnx --online-model-dir damo/speech_paraformer-large_asr_nat-zh-cn-16k-common-vocab8404-online-onnx --punc-dir damo/punc_ct-transformer_zh-cn-common-vad_realtime-vocab272727-onnx --lm-dir damo/speech_ngram_lm_zh-cn-ai-wesp-fst --itn-dir thuduj12/fst_itn_zh --hotword /workspace/models/hotwords.txt > log.txt 2>&1 &
