    # Bạn có thể tìm thấy khóa api của mình tại đây https://bailian.console.aliyun.com/?apiKey=1#/api-key
    api_key: api_key của bạn
  XunfeiSparkLLM:
    # Xác định các loại API LLM
    type: openai
    # Đầu tiên tạo một ứng dụng mới tại địa chỉ bên dưới
    # Địa chỉ ứng dụng mở: https://console.xfyun.cn/app/myapp
    # Có hạn ngạch miễn phí, nhưng bạn cũng phải kích hoạt dịch vụ để nhận api_key
