    type: tencent
    appid: Ứng dụng tổng hợp giọng nói Tencent của bạn
    secret_id: Dịch vụ tổng hợp giọng nói Tencent của bạn secret_id
    secret_key: Dịch vụ tổng hợp giọng nói Tencent của bạn secret_key
    output_dir: tmp/
  AliyunASR:
    # Dịch vụ tương tác giọng nói thông minh của Alibaba Cloud yêu cầu trước tiên phải kích hoạt dịch vụ trên nền tảng Alibaba Cloud và sau đó lấy thông tin xác minh.
    # Yêu cầu HTTP POST, xử lý âm thanh hoàn chỉnh trong một lần
    # Địa chỉ nền tảng: https://nls-portal.console.aliyun.com/
    # địa chỉ khóa ứng dụng: https://nls-portal.console.aliyun.com/applist
    # Địa chỉ mã thông báo: https://nls-portal.console.aliyun.com/overview
    # Sự khác biệt giữa AliyunASR và AliyunStreamASR là: AliyunASR là kịch bản xử lý hàng loạt và AliyunStreamASR là kịch bản tương tác thời gian thực.
    # Nói chung, ASR không phát trực tuyến rẻ hơn (0,004 nhân dân tệ/giây, 0,24 yên/phút)
    # Nhưng AliyunStreamASR có hiệu suất thời gian thực tốt hơn (0,005 nhân dân tệ/giây, 0,3 yên/phút)
    # Xác định các loại API ASR
    type: aliyun
    appkey: Appkey dự án dịch vụ tương tác giọng nói thông minh trên Đám mây Alibaba của bạn
